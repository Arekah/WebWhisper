<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebWhisper - Voice AI Browser Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 90%; max-width: 800px; text-align: center; }
        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .tagline { color: #888; font-size: 16px; margin-bottom: 40px; }
        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            cursor: pointer;
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            margin: 0 auto 30px;
        }
        .mic-button:hover { transform: scale(1.05); }
        .mic-button.listening {
            animation: pulse 1s infinite;
            background: linear-gradient(135deg, #ff4444, #ff8800);
        }
        .mic-button.processing { animation: spin-glow 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 30px rgba(255, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }
        @keyframes spin-glow {
            0% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
            50% { box-shadow: 0 0 60px rgba(123, 47, 247, 0.8); }
            100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-blue { border-color: #00d4ff33; }
        .card-purple { border-color: #7b2ff733; }
        .card-green { border-color: #00ff8833; }
        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .label-blue { color: #00d4ff; }
        .label-purple { color: #7b2ff7; }
        .label-green { color: #00ff88; }
        .status-message { font-size: 18px; color: #ccc; }
        .transcript-text { font-size: 20px; font-weight: 600; color: #fff; }
        .summary-text { font-size: 15px; color: #aaa; line-height: 1.6; }
        .history-list { text-align: left; }
        .history-item {
            font-size: 13px;
            color: #666;
            padding: 4px 0;
            border-bottom: 1px solid #222;
        }
        .history-item:last-child { color: #aaa; border-bottom: none; }
        .text-input-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .text-input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }
        .text-input:focus { border-color: #00d4ff; }
        .text-input::placeholder { color: #555; }
        .go-button {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            color: white;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
        }
        .go-button:hover { transform: scale(1.05); }
        .divider { color: #444; font-size: 13px; margin-bottom: 16px; }
        .hint { color: #555; font-size: 13px; margin-bottom: 16px; }
        .powered-by { color: #444; font-size: 13px; }
        .powered-by span { color: #00d4ff; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">WebWhisper</div>
        <div class="tagline">Whisper to the Web. It Listens.</div>

        <button class="mic-button" id="micBtn" onclick="startListening()">🎤</button>

        <div class="card" id="statusCard">
            <div class="status-message" id="statusMsg">Ready! Press mic or type a command.</div>
        </div>

        <div class="card card-blue hidden" id="transcriptCard">
            <div class="label label-blue">You said</div>
            <div class="transcript-text" id="transcriptText"></div>
        </div>

        <div class="card card-green hidden" id="summaryCard">
            <div class="label label-green">🔊 Nova says</div>
            <div class="summary-text" id="summaryText"></div>
        </div>

        <div class="card card-purple hidden" id="historyCard">
            <div class="label label-purple">Recent Commands</div>
            <div class="history-list" id="historyList"></div>
        </div>

        <div class="divider">— or type your command —</div>

        <div class="text-input-container">
            <input
                type="text"
                id="textInput"
                class="text-input"
                placeholder="e.g. open YouTube search for Python tutorials and open first video"
                onkeypress="if(event.key==='Enter') submitText()"
            />
            <button class="go-button" onclick="submitText()">Go ➤</button>
        </div>

        <div class="hint">
            Try: "search weather in Karachi" · "YouTube chicken recipe" · "Wikipedia AI and scroll down"
        </div>

        <div class="powered-by">
            Powered by <span>Amazon Nova 2 Lite</span> · <span>AWS Bedrock</span>
        </div>
    </div>

    <script>
        let isRunning = false;

        function startListening() {
            if (isRunning) return;
            isRunning = true;
            const micBtn = document.getElementById('micBtn');
            micBtn.classList.add('listening');
            micBtn.innerHTML = '🔴';
            fetch('/listen', { method: 'POST' })
                .then(res => res.json())
                .then(() => pollStatus());
        }

        function submitText() {
            if (isRunning) return;
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;
            isRunning = true;
            input.value = '';
            const micBtn = document.getElementById('micBtn');
            micBtn.classList.add('processing');
            micBtn.innerHTML = '⚡';
            fetch('/text', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            }).then(() => pollStatus());
        }

        function pollStatus() {
            const interval = setInterval(() => {
                fetch('/status')
                    .then(res => res.json())
                    .then(data => {
                        updateUI(data);

                        if (data.state === 'idle' && isRunning) {
                            clearInterval(interval);
                            isRunning = false;

                            // Reset mic button
                            const micBtn = document.getElementById('micBtn');
                            micBtn.classList.remove('listening', 'processing');
                            micBtn.innerHTML = '🎤';

                            // Clear cards
                            document.getElementById('transcriptCard').classList.add('hidden');
                            document.getElementById('summaryCard').classList.add('hidden');

                            // Show done message
                            document.getElementById('statusMsg').textContent = '✅ Done! Press mic or type for next command.';
                        }

                        if (data.state === 'processing') {
                            const micBtn = document.getElementById('micBtn');
                            micBtn.classList.remove('listening');
                            micBtn.classList.add('processing');
                            micBtn.innerHTML = '⚡';
                        }
                    });
            }, 500);
        }

        function updateUI(data) {
            document.getElementById('statusMsg').textContent = data.message;

            if (data.transcript) {
                document.getElementById('transcriptCard').classList.remove('hidden');
                document.getElementById('transcriptText').textContent = data.transcript;
            }

            if (data.actions && data.actions.length > 0) {
                const plan = data.actions[0];
                if (plan.summary) {
                    document.getElementById('summaryCard').classList.remove('hidden');
                    document.getElementById('summaryText').textContent = plan.summary;
                }
            }

            if (data.history && data.history.length > 0) {
                document.getElementById('historyCard').classList.remove('hidden');
                const list = document.getElementById('historyList');
                list.innerHTML = '';
                data.history.slice().reverse().forEach(cmd => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.textContent = '▸ ' + cmd;
                    list.appendChild(item);
                });
            }
        }
    </script>
</body>
</html>
